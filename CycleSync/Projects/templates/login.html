{% extends "base.html" %} {% block title %}Login - CycleSync{% endblock %} {%
block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-icon">🌸</span>
      <h2>Welcome Back</h2>
      <p class="auth-subtitle">
        Log in to continue your cycle tracking journey
      </p>
    </div>

    <form method="POST" action="{{ url_for('login') }}" class="auth-form">
      <div class="form-group">
        <label for="username"> <span>👤</span> Username </label>
        <input
          type="text"
          id="username"
          name="username"
          required
          placeholder="Enter your username"
          autofocus
        />
      </div>

      <div class="form-group">
        <label for="password"> <span>🔒</span> Password </label>
        <input
          type="password"
          id="password"
          name="password"
          required
          placeholder="Enter your password"
        />
      </div>

      <button type="submit" class="btn btn-primary btn-block">Login</button>
    </form>

    <div class="auth-footer">
      <p>
        Don't have an account?
        <a href="{{ url_for('signup') }}">Sign up here</a>
      </p>
      <p class="demo-note">Demo: username "demo" / password "password123"</p>
    </div>
  </div>
</div>
{% endblock %}
