{% extends "base.html" %} {% block title %}Daily Log - CycleSync{% endblock %}
{% block content %}
<div class="form-container">
  <div class="form-card">
    <div class="form-header">
      <span class="form-icon">📝</span>
      <h2>Daily Wellness Log</h2>
      <p class="form-description">
        How are you feeling today? Track your mood, energy, and symptoms
      </p>
    </div>

    <form
      method="POST"
      action="{{ url_for('daily_log') }}"
      class="daily-log-form"
    >
      <div class="form-group">
        <label for="log_date"> <span>📅</span> Date * </label>
        <input type="date" id="log_date" name="log_date" required />
      </div>

      <div class="form-group">
        <label for="mood"> <span>😊</span> Mood * </label>
        <select id="mood" name="mood" required>
          <option value="">Select your mood</option>
          <option value="happy">😊 Happy - Feeling great and positive</option>
          <option value="neutral">
            😐 Neutral - Just okay, nothing special
          </option>
          <option value="sad">😔 Sad - Feeling down or blue</option>
          <option value="anxious">😰 Anxious - Nervous or worried</option>
          <option value="irritable">
            😤 Irritable - Easily annoyed or frustrated
          </option>
        </select>
      </div>

      <div class="form-group">
        <label> <span>⚡</span> Energy Level * (1-5) </label>
        <div class="energy-selector">
          <div class="energy-options">
            <label class="energy-option">
              <input type="radio" name="energy_level" value="1" required />
              <span>1 - Very Low</span>
            </label>
            <label class="energy-option">
              <input type="radio" name="energy_level" value="2" />
              <span>2 - Low</span>
            </label>
            <label class="energy-option">
              <input type="radio" name="energy_level" value="3" />
              <span>3 - Moderate</span>
            </label>
            <label class="energy-option">
              <input type="radio" name="energy_level" value="4" />
              <span>4 - High</span>
            </label>
            <label class="energy-option">
              <input type="radio" name="energy_level" value="5" />
              <span>5 - Very High</span>
            </label>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label> <span>🤒</span> Symptoms (Select all that apply) </label>
        <div class="checkbox-group">
          <label
            ><input type="checkbox" name="symptoms" value="cramps" />
            Cramps</label
          >
          <label
            ><input type="checkbox" name="symptoms" value="headache" />
            Headache</label
          >
          <label
            ><input type="checkbox" name="symptoms" value="bloating" />
            Bloating</label
          >
          <label
            ><input type="checkbox" name="symptoms" value="fatigue" />
            Fatigue</label
          >
          <label
            ><input type="checkbox" name="symptoms" value="acne" /> Acne</label
          >
          <label
            ><input type="checkbox" name="symptoms" value="breast_tenderness" />
            Breast Tenderness</label
          >
          <label
            ><input type="checkbox" name="symptoms" value="nausea" />
            Nausea</label
          >
          <label
            ><input type="checkbox" name="symptoms" value="back_pain" /> Back
            Pain</label
          >
          <label
            ><input type="checkbox" name="symptoms" value="mood_swings" /> Mood
            Swings</label
          >
          <label
            ><input type="checkbox" name="symptoms" value="cravings" /> Food
            Cravings</label
          >
        </div>
      </div>

      <div class="form-group">
        <label for="notes"> <span>📝</span> Notes (Optional) </label>
        <textarea
          id="notes"
          name="notes"
          rows="4"
          placeholder="Anything else? Sleep quality, stress levels, exercise, what helped today?"
        ></textarea>
      </div>

      <button type="submit" class="btn btn-primary btn-block">
        Save Daily Log
      </button>
    </form>

    <div class="form-footer">
      <a href="{{ url_for('dashboard') }}" class="btn btn-secondary"
        >Back to Dashboard</a
      >
    </div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const dateInput = document.getElementById("log_date");
    const today = new Date().toISOString().split("T")[0];

    if (!dateInput.value) dateInput.value = today;
    dateInput.max = today;

    const energyOptions = document.querySelectorAll(".energy-option");
    energyOptions.forEach((option) => {
      option.addEventListener("click", function () {
        energyOptions.forEach((opt) => opt.classList.remove("selected"));
        this.classList.add("selected");
      });
    });
  });
</script>
{% endblock %}
